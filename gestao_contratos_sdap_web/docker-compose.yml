services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestao_contratos}
      POSTGRES_USER: ${POSTGRES_USER:-gestao_contratos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-altere-esta-senha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestao_contratos} -d ${POSTGRES_DB:-gestao_contratos}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_ENGINE: postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-gestao_contratos}
      POSTGRES_USER: ${POSTGRES_USER:-gestao_contratos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-altere-esta-senha}
      DJANGO_DEBUG: 0
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

volumes:
  postgres_data:
  media_data:
  static_data:
