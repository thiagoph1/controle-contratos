services:
  - type: web
    name: gestao-contratos-sdap
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./scripts/docker-entrypoint.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: DJANGO_SECURE_COOKIES
        value: "1"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "1"
      - key: DB_ENGINE
        value: "postgresql"
      - key: DATABASE_URL
        fromDatabase:
          name: gestao-contratos-db
          property: connectionString

databases:
  - name: gestao-contratos-db
    plan: free
    postgresMajorVersion: 16
