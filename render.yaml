services:
  - type: web
    name: gestao-contratos-sdap
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./scripts/docker-entrypoint.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://*.onrender.com/"
      - key: DJANGO_SECURE_COOKIES
        value: "1"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "1"
      - key: DJANGO_HSTS_SECONDS
        value: "31536000"
      - key: DB_ENGINE
        value: "postgresql"
      - key: DATABASE_URL
        fromDatabase:
          name: gestao-contratos-db
          property: connectionString
      - key: INITIAL_ADMIN_USERNAME
        value: "admin"
      - key: INITIAL_ADMIN_PASSWORD
        value: "admin123"
      - key: INITIAL_ADMIN_EMAIL
        value: "admin@example.com"
      - key: SYSTEM_NAME
        value: "Gestão de Contratos — SDAP"
      - key: SYSTEM_ORGANIZATION
        value: "Subdiretoria de Apoio Administrativo"
      - key: MEDIA_ROOT
        value: "/app/media"

databases:
  - name: gestao-contratos-db
    plan: free
    postgresMajorVersion: 16
